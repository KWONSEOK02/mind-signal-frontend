language: ko-KR
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - dev
  path_instructions:
    - path: "src/07-shared/**"
      instructions: |
        07-shared는 최하위 레이어. 다른 레이어(05-features, 03-pages 등)를 import하면 위반.
        process.env 직접 접근 금지 — config.ts의 config 객체 사용 필수.
    - path: "src/05-features/**"
      instructions: |
        FSD 규칙: 05-features는 07-shared만 import 가능. 03-pages, 04-widgets import 금지.
        API 호출은 07-shared/api의 Axios 인스턴스 사용 — fetch() 직접 사용 금지.
    - path: "src/03-pages/**"
      instructions: |
        FSD 규칙: 03-pages는 04-widgets, 05-features, 07-shared import 가능.
        다른 page를 직접 import하면 위반.
    - path: "src/**/*.tsx"
      instructions: |
        any 타입 사용 금지. Props 타입 명시 필수.
        hooks, 브라우저 API, 이벤트 핸들러 사용 시 'use client' 선언 확인.
        React Server/Client Component 경계 위반 여부.
        보안: 하드코딩된 시크릿, unsafe innerHTML, 미검증 리다이렉트.
        포매팅(스타일) 무시 — Prettier가 통제함.
    - path: "src/**/*.test.{ts,tsx}"
      instructions: |
        퍼블릭 함수당 happy path + 최소 1개 에러 경로 테스트 커버리지.
        구현 세부사항이 아닌 관찰 가능한 동작 테스트 여부.
        포매팅 무시.
    - path: "e2e/**/*.spec.ts"
      instructions: |
        E2E 테스트 안정성: flaky selector 사용 여부 (data-testid 권장).
        테스트 간 상태 격리 여부.
chat:
  auto_reply: true
